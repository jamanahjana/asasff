

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>WatcFFh Video Online</title>

<meta name="description"
      content="Fast and simple video streaming experience.">

  <!-- OPEN GRAPH -->
<meta property="og:title" content="Watch Video Online">
<meta property="og:description" content="Fast and simple video streaming experience.">
<meta property="og:type" content="website">
  
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:Arial,sans-serif;
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    overflow-x:hidden;
}

/* BACKGROUND */
body::before{
    content:'';
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top,
    rgba(37,99,235,.20),
    transparent 40%),

    radial-gradient(circle at bottom,
    rgba(59,130,246,.15),
    transparent 40%);

    z-index:-1;
}

/* CONTAINER */
.container{
    width:100%;
    max-width:420px;
    text-align:center;
}

/* LOGO */
.logo{
    font-size:38px;
    font-weight:800;
    color:#4e8cff;
    margin-bottom:18px;
    letter-spacing:-1px;
}

/* DESCRIPTION */
.desc{
    font-size:16px;
    color:#d4d4d4;
    line-height:1.6;
    margin-bottom:30px;
    padding:0 10px;
}

/* BUTTON */
.btn{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;

    width:100%;
    height:58px;

    margin-bottom:16px;

    border-radius:14px;

    text-decoration:none;

    font-size:17px;
    font-weight:600;

    color:#fff;

    overflow:hidden;

    transition:all .2s ease;

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);
}

/* PLAY BUTTON */
.btn-primary{
    background:linear-gradient(135deg,#2563eb,#3b82f6);

    box-shadow:
    0 8px 25px rgba(37,99,235,.35);
}

/* VIDEO LINK 2 & 3 */
.btn-secondary{
    background:linear-gradient(135deg,#1f2937,#374151);

    box-shadow:
    0 8px 20px rgba(0,0,0,.25);
}

/* VIDEO LINK 4 */
.btn-third{
    background:linear-gradient(135deg,#1d4ed8,#2563eb);

    box-shadow:
    0 8px 25px rgba(37,99,235,.25);
}

/* HOVER */
.btn:hover{
    transform:translateY(-2px) scale(1.01);
}

/* ACTIVE */
.btn:active{
    transform:scale(.98);
}

/* FOOTER */
.footer{
    margin-top:20px;

    font-size:13px;

    color:#777;
}

/* MOBILE */
@media(max-width:480px){

    body{
        padding:18px;
    }

    .logo{
        font-size:34px;
    }

    .desc{
        font-size:15px;
    }

    .btn{
        height:56px;
        font-size:16px;
        border-radius:12px;
    }
}

</style>
</head>
<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        Videy.co
    </div>

    <!-- DESCRIPTION -->
    <div class="desc">
    Video is ready to play. If one link doesn't work, try another available link below 👇
	</div>

    <!-- PLAY VIDEO -->
    <a class="btn btn-primary"
       href="https://inikokokdad.github.io/RDRtt/"
       target="_blank"
       rel="noopener noreferrer">

        ▶️ Play Video

    </a>

    <!-- VIDEO LINK 2 -->
    <a class="btn btn-secondary"
       href="https://inikokokdad.github.io/RDRtt/"
       target="_blank"
       rel="noopener noreferrer">

        🔥 Video Link 2

    </a>

    <!-- VIDEO LINK 3 -->
    <a class="btn btn-secondary"
       href="https://lamaanaja.github.io/bcxcbbcxcbx/"
       target="_blank"
       rel="noopener noreferrer">

        💎 Video Link 3

    </a>
   
    <!-- VIDEO LINK 4 -->
    <a class="btn btn-third"
       href="https://inikokokdad.github.io/RDRtt/"
       target="_blank"
       rel="noopener noreferrer">

        🎬 Video Link 4

    </a>

    <!-- FOOTER -->
    <div class="footer">
        Powered by Videy CDN
    </div>

</div>

</body>
</html>
